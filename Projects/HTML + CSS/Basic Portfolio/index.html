<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Portfolio</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./Styles/style.css" />
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Logos from Font Awesome -->
    <script src="https://kit.fontawesome.com/ff130025d1.js" crossorigin="anonymous"></script>

  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <nav>
        <!-- logo -->
         <div class="logo">
            <img src="./Assets/Logo.png" alt="Logo"/>
         </div>
        <div class="links">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </div>
        <div class="search-field">
            <input type="text" placeholder="Search" />
            <button>Search</button>
        </div>
      </nav>
    </header>
    <!-- Hero Section -->
    <section class="section">
        <!-- Left part -->
        <div class="hero-left-part">
            <h1>Hello, I am a <span>web Developer</span>.</h1>
            <p>I am an aspiring <span>Full Stack JavaScript Developer</span>,<br>who is currently working as a <span>Freelancer</span> for<br><span>National and International Client.</span></p>
        </div>
        <!-- Right Part -->
        <div class="hero-right-part">
            <img src="./Assets/AnandPic.png" alt="Image">
            <div>
                <button>Chat With Me</button>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div>
            <p>Copyright © 2026 anand.pvt.ltd. All rights reserved.</p>
        </div>
        <div class="logo-links">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </footer>
  </body>
</html>
