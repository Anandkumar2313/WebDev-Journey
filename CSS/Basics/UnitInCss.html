<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units in CSS</title>
    <style>
        body{
            font-size: 1px;
        }
        section{
            border: 1px solid #ff0000;
            /* width: 50vw; */
            height: 100vh;
            font-size: 10px;
        }
        main{
            border: 1px dashed #000000;
            /* width: 50vh; */
            height: 50vh;
            /*font-size: 2em;*/ /*here font-size = 2*font-size of section that is 20px if parent font-size not declared then it will multiply with default 16px*/

            font-size: 3rem; /*this unit depends on root(Here body tag) default value of 1rem is 16px*/
        }
    </style>
</head>
<body>
    <section>
        <main>Hello World!</main>
    </section>
</body>
</html>
