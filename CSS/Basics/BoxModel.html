<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        div{
            
            /* padding: 10px 2px 15px 8px; */
            
            /* it means -
            paddint at top = 10px
            paddint at right = 2px
            paddint at bottom = 15px
            paddint at left = 8px */
            
            /* We can also write */
            /* padding-top: 10px;
            padding-right: 2px;
            padding-bottom: 15px;
            padding-left: 8px; */
            
            /* padding = 10px will be given in all 4 position by the following */
            padding: 10px;
            margin: 10px;
            border: 2px solid black;
        }
        p{
            margin: 10px;
            padding: 5px;
            border: 3px dashed red;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <h1>Skill India</h1>
    <div>Anand Kumar</div>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Debitis, exercitationem!</p>
</body>
</html>
