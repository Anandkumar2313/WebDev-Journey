<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Demo</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>User Details!!</legend>
            <label for="name">Enter your name : </label>
            <input type="text" placeholder="Anand Kumar" id="name" name="username"><br><br>
            <label for="address">Enter Address : </label>
            <textarea rows="10" cols="30" id="address" name="useraddress"></textarea>
            <br><br>
            <label for="dob">DOB : </label>
            <input type="date" id="dob" name="userdob">
            <br><br>
            <label for="password">Password : </label>
            <input type="password" id="password" name="UserPassword">
            <br><br>

            <span>Gender : </span>
            <label for="Male">Male</label>
            <input type="radio" id="Male" name="gender">
            <label for="Female">Female</label>
            <input type="radio" id="Female" name="gender">
            <br><br>

            <span>Favourites Movies : </span>
            <label for="Avengers">Avengers</label>
            <input type="checkbox" name="Movies" id="Avengers">
            <label for="IronMan">IronMan</label>
            <input type="checkbox" name="Movies" id="IronMan">
            <label for="Thor">Thor</label>
            <input type="checkbox" name="Movies" id="Thor">

            <br><br>
            <input type="submit">
        </fieldset>
    </form>
</body>
</html>
