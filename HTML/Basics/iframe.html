    <title>Iframe</title>
</head>
<body>
    <!-- iframe ka use kisi dusri website ya content ko apni webpage ke andar show/embed karne ke liye hota hai -->

    <!-- Example --
    YouTube video embed karna
    Google Maps show karna
    Dusri website open karna
    PDF display karna -->
    
    <iframe src="https://www.youtube.com/embed/7O0B4_vbXDI?si=zvGOc_zM2XWD2D7f" frameborder="0" height="400px" width="900px"></iframe>
    
</body>
</html>
