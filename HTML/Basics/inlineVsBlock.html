<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Vs Block Element</title>
</head>
<body>
    <!-- They are Block element -->
    <h1>Anand hero</h1>
    <h1>AnandHero</h1>
    <p>Anand kumar,</p>
    <p>He is good boy</p>
    <div>Lorem ipsum dolor sit amet.</div> <!-- div tag is most famous block tag-->
    <div>Lorem ipsum dolor sit amet.</div>
    <p>-------------------------</p>
    <!-- They are inline element -->
    <span>Anand kumar,</span> <!-- span tag is most famous inline tag-->
    <span>He is good boy.</span>
</body>
</html>
